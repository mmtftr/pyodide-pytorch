[pytorch]
repository = "https://github.com/pytorch/pytorch.git"
ref = "cf30153c4c131c8164ee7798e5022d810682e2cb"
version = "2.13.0+pyodide0.24.1"

[pyodide]
version = "0.24.1"
build_version = "0.24.1"
