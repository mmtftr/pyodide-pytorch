name: Validate repository

on:
  pull_request:
  push:
    paths:
      - "config/**"
      - "patches/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/**"

permissions:
  contents: read
  statuses: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Publish pending validation status
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/publish_status.sh pytorch-pyodide/validate pending
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate manifest and tools
        run: |
          python scripts/config.py check
          python scripts/validate_patches.py
          python -m compileall -q scripts tests
          python -m unittest discover -s tests -p 'test_*.py' -v
      - name: Validate shell syntax and whitespace
        run: |
          bash -n scripts/*.sh
          git diff --check HEAD
      - name: Publish final validation status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/publish_status.sh pytorch-pyodide/validate "${{ job.status }}"
