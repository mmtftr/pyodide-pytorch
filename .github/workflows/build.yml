name: Build PyTorch wheel

on:
  workflow_dispatch:
  create:
  push:
    branches: [main]
    tags: ["torch-*-pyodide-*"]
    paths:
      - "config/**"
      - "patches/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/build.yml"

concurrency:
  group: pytorch-pyodide-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') && github.event_name != 'create' }}

permissions:
  contents: write
  id-token: write
  attestations: write
  statuses: write

jobs:
  build:
    if: >-
      github.event_name != 'create' ||
      (
        github.event.ref_type == 'branch' &&
        startsWith(github.event.ref, 'release/torch-') &&
        contains(github.event.ref, '-pyodide-')
      )
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Check out build repository
        uses: actions/checkout@v7

      - name: Publish pending build status
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/publish_status.sh pytorch-pyodide/build pending

      - name: Read pinned configuration
        id: config
        run: |
          python3 scripts/config.py check
          python3 scripts/config.py github-output >> "$GITHUB_OUTPUT"
          python3 scripts/config.py env >> "$GITHUB_ENV"

      - name: Verify release request
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'create'
        env:
          CREATED_REF: ${{ github.event.ref }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "create" ]]; then
            requested_tag="${CREATED_REF#release/}"
          else
            requested_tag="$GITHUB_REF_NAME"
          fi
          if [[ "$requested_tag" != "$RELEASE_TAG" ]]; then
            echo "::error::Requested release $requested_tag does not match pinned $RELEASE_TAG"
            exit 1
          fi
          if [[ "$GITHUB_EVENT_NAME" == "create" ]]; then
            git fetch --no-tags --depth=1 origin main
            main_sha="$(git rev-parse FETCH_HEAD)"
            if [[ "$GITHUB_SHA" != "$main_sha" ]]; then
              echo "::error::Release branches must point at the current main commit $main_sha"
              exit 1
            fi
          fi

      - name: Check out pinned PyTorch source
        uses: actions/checkout@v7
        with:
          repository: pytorch/pytorch
          ref: ${{ steps.config.outputs.pytorch_ref }}
          path: pytorch
          fetch-depth: 1
          submodules: recursive
          persist-credentials: false

      - name: Apply ordered patches
        run: scripts/apply_patches.sh pytorch

      - name: Set up host Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ steps.config.outputs.python_version }}

      - name: Restore Pyodide cross-build environment
        id: xbuildenv-restore
        uses: actions/cache/restore@v6
        with:
          path: .pyodide-xbuildenv
          key: xbuildenv-v1-${{ runner.os }}-${{ runner.arch }}-python-${{ steps.config.outputs.python_version }}-pyodide-${{ steps.config.outputs.pyodide_version }}-build-${{ steps.config.outputs.pyodide_build_version }}

      - name: Install build tools
        env:
          DEFAULT_CROSS_BUILD_ENV_URL: https://github.com/pyodide/pyodide/releases/download/${{ steps.config.outputs.pyodide_version }}/xbuildenv-${{ steps.config.outputs.pyodide_version }}.tar.bz2
          PYODIDE_XBUILDENV_PATH: ${{ github.workspace }}/.pyodide-xbuildenv
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "pyodide-build==${PYODIDE_BUILD_VERSION}" \
            "wheel==${WHEEL_VERSION}" \
            "ninja==${NINJA_VERSION}" \
            "cmake==${CMAKE_VERSION}"
          actual_pyodide_build="$(python -c 'import importlib.metadata; print(importlib.metadata.version("pyodide-build"))')"
          test "$actual_pyodide_build" = "$PYODIDE_BUILD_VERSION"
          test "$(cmake --version | head -1)" = "cmake version $CMAKE_VERSION"
          sudo apt-get update
          sudo apt-get install --yes ccache
          actual_emscripten="$(pyodide config get emscripten_version)"
          test "$actual_emscripten" = "$EMSCRIPTEN_VERSION"

      - name: Save Pyodide cross-build environment
        if: steps.xbuildenv-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: .pyodide-xbuildenv
          key: xbuildenv-v1-${{ runner.os }}-${{ runner.arch }}-python-${{ steps.config.outputs.python_version }}-pyodide-${{ steps.config.outputs.pyodide_version }}-build-${{ steps.config.outputs.pyodide_build_version }}

      - name: Restore compiler cache
        id: ccache-restore
        uses: actions/cache/restore@v6
        with:
          path: .ccache
          key: ccache-v2-${{ runner.os }}-${{ runner.arch }}-emcc-${{ steps.config.outputs.emscripten_version }}-${{ steps.config.outputs.python_tag }}-pyodide-build-${{ steps.config.outputs.pyodide_build_version }}-torch-${{ steps.config.outputs.pytorch_ref }}-${{ hashFiles('config/build.toml', 'config/build-constraints.txt', 'patches/pytorch/*.patch', 'scripts/build_wheel.sh') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ccache-v2-${{ runner.os }}-${{ runner.arch }}-emcc-${{ steps.config.outputs.emscripten_version }}-${{ steps.config.outputs.python_tag }}-pyodide-build-${{ steps.config.outputs.pyodide_build_version }}-torch-${{ steps.config.outputs.pytorch_ref }}-${{ hashFiles('config/build.toml', 'config/build-constraints.txt', 'patches/pytorch/*.patch', 'scripts/build_wheel.sh') }}-
            ccache-v2-${{ runner.os }}-${{ runner.arch }}-emcc-${{ steps.config.outputs.emscripten_version }}-${{ steps.config.outputs.python_tag }}-pyodide-build-${{ steps.config.outputs.pyodide_build_version }}-torch-${{ steps.config.outputs.pytorch_ref }}-
            ccache-v2-${{ runner.os }}-${{ runner.arch }}-emcc-${{ steps.config.outputs.emscripten_version }}-${{ steps.config.outputs.python_tag }}-pyodide-build-${{ steps.config.outputs.pyodide_build_version }}-

      - name: Report compiler cache restore
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          CCACHE_MATCHED_KEY: ${{ steps.ccache-restore.outputs.cache-matched-key }}
        run: |
          if [[ -n "$CCACHE_MATCHED_KEY" ]]; then
            echo "Restored compiler cache: $CCACHE_MATCHED_KEY"
          else
            echo "No compiler cache matched; this run will seed one"
          fi
          ccache --show-stats

      - name: Restore native protoc cache
        id: protoc-restore
        uses: actions/cache/restore@v6
        with:
          path: ${{ runner.temp }}/pytorch-host-protobuf
          key: host-protoc-ubuntu-24.04-${{ runner.arch }}-cmake-${{ steps.config.outputs.cmake_version }}-torch-${{ steps.config.outputs.pytorch_ref }}-${{ hashFiles('scripts/build_host_protoc.sh') }}

      - name: Build native protoc from the pinned submodule
        if: steps.protoc-restore.outputs.cache-hit != 'true'
        run: scripts/build_host_protoc.sh pytorch "$RUNNER_TEMP/pytorch-host-protobuf"

      - name: Verify native protoc
        run: test -x "$RUNNER_TEMP/pytorch-host-protobuf/bin/protoc"

      - name: Save native protoc cache
        if: steps.protoc-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ${{ runner.temp }}/pytorch-host-protobuf
          key: host-protoc-ubuntu-24.04-${{ runner.arch }}-cmake-${{ steps.config.outputs.cmake_version }}-torch-${{ steps.config.outputs.pytorch_ref }}-${{ hashFiles('scripts/build_host_protoc.sh') }}

      - name: Set up pinned Emscripten
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: ${{ steps.config.outputs.emscripten_version }}
          actions-cache-folder: emsdk-cache

      - name: Normalize pinned Emscripten path for ccache
        run: |
          stable_emsdk="$GITHUB_WORKSPACE/emsdk-cache/emsdk-main"
          test -x "$stable_emsdk/emsdk"
          "$stable_emsdk/emsdk" activate "$EMSCRIPTEN_VERSION"
          source "$stable_emsdk/emsdk_env.sh" >/dev/null
          {
            echo "EMSDK=$EMSDK"
            echo "EMSDK_NODE=$EMSDK_NODE"
          } >> "$GITHUB_ENV"
          echo "$EMSDK" >> "$GITHUB_PATH"
          echo "$EMSDK/upstream/emscripten" >> "$GITHUB_PATH"
          test "$(command -v emcc)" = "$EMSDK/upstream/emscripten/emcc"

      - name: Verify Emscripten CMake link features
        run: |
          stable_emscripten_root="$GITHUB_WORKSPACE/emsdk-cache/emsdk-main/upstream/emscripten"
          test "$(em-config EMSCRIPTEN_ROOT)" = "$stable_emscripten_root"
          toolchain="$(em-config EMSCRIPTEN_ROOT)/cmake/Modules/Platform/Emscripten.cmake"
          grep -Fq \
            'set(CMAKE_LINK_LIBRARY_USING_WHOLE_ARCHIVE_SUPPORTED True)' \
            "$toolchain"

      - name: Build raw WebAssembly wheel
        env:
          CCACHE_BASEDIR: ${{ github.workspace }}/pytorch
          CCACHE_COMPILERCHECK: content
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          CCACHE_MAXSIZE: 2G
          CCACHE_NOHASHDIR: "true"
          CCACHE_SLOPPINESS: include_file_ctime,include_file_mtime,system_headers
          DEFAULT_CROSS_BUILD_ENV_URL: https://github.com/pyodide/pyodide/releases/download/${{ steps.config.outputs.pyodide_version }}/xbuildenv-${{ steps.config.outputs.pyodide_version }}.tar.bz2
          PYODIDE_XBUILDENV_PATH: ${{ github.workspace }}/.pyodide-xbuildenv
          PYTORCH_HOST_PROTOC: ${{ runner.temp }}/pytorch-host-protobuf/bin/protoc
        run: |
          ccache --show-config
          ccache --zero-stats
          SOURCE_DATE_EPOCH="$(git -C pytorch show -s --format=%ct HEAD)"
          echo "SOURCE_DATE_EPOCH=$SOURCE_DATE_EPOCH" >> "$GITHUB_ENV"
          scripts/build_wheel.sh pytorch wheelhouse/raw
          ccache --show-stats --verbose

      - name: Prepare compiler cache for rolling save
        if: ${{ always() && !cancelled() && steps.ccache-restore.outcome == 'success' }}
        continue-on-error: true
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          CCACHE_MAXSIZE: 2G
        run: |
          ccache --cleanup
          ccache --show-stats --verbose

      - name: Save compiler cache
        if: ${{ always() && !cancelled() && steps.ccache-restore.outcome == 'success' }}
        continue-on-error: true
        uses: actions/cache/save@v6
        with:
          path: .ccache
          key: ccache-v2-${{ runner.os }}-${{ runner.arch }}-emcc-${{ steps.config.outputs.emscripten_version }}-${{ steps.config.outputs.python_tag }}-pyodide-build-${{ steps.config.outputs.pyodide_build_version }}-torch-${{ steps.config.outputs.pytorch_ref }}-${{ hashFiles('config/build.toml', 'config/build-constraints.txt', 'patches/pytorch/*.patch', 'scripts/build_wheel.sh') }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Prune and validate wheel
        id: wheel
        run: |
          mapfile -t raw_wheels < <(find wheelhouse/raw -maxdepth 1 -type f -name '*.whl' -print)
          test "${#raw_wheels[@]}" -eq 1
          python scripts/postprocess_wheel.py \
            "${raw_wheels[0]}" \
            --output-dir wheelhouse/dist \
            --source-date-epoch "$SOURCE_DATE_EPOCH"
          mapfile -t wheels < <(find wheelhouse/dist -maxdepth 1 -type f -name '*.whl' -print)
          test "${#wheels[@]}" -eq 1
          python scripts/validate_wheel.py "${wheels[0]}"
          wheel_dir="$(dirname "${wheels[0]}")"
          wheel_name="$(basename "${wheels[0]}")"
          (
            cd "$wheel_dir"
            sha256sum "$wheel_name" > "$wheel_name.sha256"
          )
          python scripts/release_manifest.py \
            "${wheels[0]}" \
            --output wheelhouse/dist/build-manifest.json
          echo "path=${wheels[0]}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "${wheels[0]}")" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"

      - name: Test inside pinned Pyodide
        run: |
          npm install --no-save "pyodide@$PYODIDE_VERSION"
          node tests/smoke.mjs \
            "${{ steps.wheel.outputs.path }}" \
            "$PYTORCH_VERSION" \
            "$PYTORCH_REF"

      - name: Upload unverified wheel after validation or smoke failure
        if: ${{ failure() && steps.wheel.outcome != 'skipped' }}
        uses: actions/upload-artifact@v7
        with:
          name: unverified-torch-${{ steps.config.outputs.pytorch_version }}-pyodide-${{ steps.config.outputs.pyodide_version }}
          path: |
            wheelhouse/raw/*
            wheelhouse/dist/*
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Upload wheel and provenance
        uses: actions/upload-artifact@v7
        with:
          name: torch-${{ steps.config.outputs.pytorch_version }}-pyodide-${{ steps.config.outputs.pyodide_version }}
          path: wheelhouse/dist/*
          if-no-files-found: error
          retention-days: 90
          compression-level: 0

      - name: Attest wheel provenance
        # GitHub does not provide artifact attestations for user-owned private
        # repositories. Release publication must not discard an otherwise
        # verified wheel; attestations become mandatory once the repo is public.
        if: github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            wheelhouse/dist/*.whl
            wheelhouse/dist/*.sha256
            wheelhouse/dist/build-manifest.json

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'create'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "create" ]]; then
            if tag_ref="$(
              gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG" \
                --jq '.object.type + " " + .object.sha' 2>/dev/null
            )"; then
              :
            else
              tag_ref=""
            fi
            if [[ -z "$tag_ref" ]]; then
              gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
                -f ref="refs/tags/$RELEASE_TAG" \
                -f sha="$GITHUB_SHA" >/dev/null
            elif [[ "$tag_ref" != "commit $GITHUB_SHA" ]]; then
              echo "::error::Existing tag $RELEASE_TAG points at $tag_ref"
              exit 1
            fi
          fi
          gh release create "$RELEASE_TAG" \
            --verify-tag \
            --generate-notes \
            --title "$RELEASE_TAG" \
            wheelhouse/dist/*

      - name: Upload CMake diagnostics after failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cmake-diagnostics-${{ github.run_id }}
          path: |
            pytorch/build/CMakeCache.txt
            pytorch/build/CMakeFiles/CMakeError.log
            pytorch/build/CMakeFiles/CMakeOutput.log
            pytorch/build/build.ninja
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish final build status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/publish_status.sh pytorch-pyodide/build "${{ job.status }}"
