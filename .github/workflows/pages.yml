name: Deploy playground to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  release:
    types: [published]
  workflow_run:
    workflows:
      - Build PyTorch wheel
      - Publish verified release artifact
    types: [completed]
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Assemble verified playground
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p public/runtime
          cp -a site/. public/
          release_args=()
          if [[ -n "$RELEASE_TAG" ]]; then
            release_args+=("$RELEASE_TAG")
          fi
          gh release download "${release_args[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "build-manifest.json" \
            --pattern "*.whl" \
            --pattern "*.whl.sha256" \
            --dir public/runtime
          builder_commit="$(
            python3 -c 'import json; print(json.load(open("public/runtime/build-manifest.json"))["builder_repository_commit"])'
          )"
          python3 scripts/verify_release_artifact.py \
            public/runtime \
            --builder-commit "$builder_commit"

      - name: Upload playground artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
